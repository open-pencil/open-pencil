name: Setup Bun workspace

description: Check out-independent Bun setup, cache, optional LFS pull, and install.

inputs:
  install-args:
    description: Arguments passed to bun install.
    required: false
    default: --frozen-lockfile
  lfs:
    description: Pull Git LFS files before installing dependencies.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Pull LFS files
      if: inputs.lfs == 'true'
      shell: bash
      run: |
        git lfs install --force
        # Try the configured LFS endpoint first (R2 proxy via .lfsconfig).
        # If that fails (e.g. fork PR CI runners can't authenticate with the
        # upstream's LFS proxy), fall back to GitHub's native LFS endpoint
        # by removing the .lfsconfig override. Fork PR branches that have
        # pushed LFS objects to the fork's own GitHub LFS storage will
        # resolve successfully.
        if ! git lfs pull 2>/dev/null; then
          echo "::warning::LFS pull from configured endpoint failed, falling back to GitHub native LFS..."
          rm -f .lfsconfig
          git config --local --unset lfs.url 2>/dev/null || true
          git lfs install --force
          git lfs pull
        fi

    - uses: oven-sh/setup-bun@v2

    - uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: bun-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: bun install ${{ inputs.install-args }}
