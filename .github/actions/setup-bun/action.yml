name: Setup Bun workspace

description: Check out-independent Bun setup, cache, optional LFS pull, and install.

inputs:
  install-args:
    description: Arguments passed to bun install.
    required: false
    default: --frozen-lockfile
  lfs:
    description: Pull Git LFS files before installing dependencies.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Pull LFS files
      if: inputs.lfs == 'true'
      shell: bash
      env:
        HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      run: |
        git lfs install --force
        # Try the configured LFS endpoint first (R2 proxy via .lfsconfig).
        # If that fails (e.g. fork PR CI runners can't authenticate with the
        # upstream's LFS proxy), fall back to the PR branch's own GitHub LFS
        # storage. Fork PR branches must have LFS objects pushed to the
        # fork's GitHub LFS (git lfs push origin <branch> --all after
        # temporarily overriding lfs.url to the fork's /info/lfs endpoint).
        if ! git lfs pull; then
          echo "::warning::LFS pull from configured endpoint failed, falling back to GitHub LFS for $HEAD_REPO..."
          git config --local lfs.url "https://github.com/${HEAD_REPO}.git/info/lfs"
          git lfs install --force
          git lfs pull
        fi

    - uses: oven-sh/setup-bun@v2

    - uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: bun-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: bun install ${{ inputs.install-args }}
